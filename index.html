<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Data Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1e3a8a; /* Deep Blue */
            --primary-hover: #1d4ed8;
            --success-color: #10b981; /* Emerald Green */
            --danger-color: #ef4444; /* Soft Red */
            --bg-color: #f8fafc; /* Slate Light */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        /* Header Style */
        header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Card Layout */
        .card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            padding: 24px;
            margin-bottom: 24px;
        }

        /* Form Controls */
        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) auto;
            gap: 16px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background-color: #f1f5f9;
        }

        .btn-danger {
            background-color: transparent;
            color: var(--danger-color);
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-danger:hover {
            background-color: #fef2f2;
            border-radius: 4px;
        }

        /* Toolbar Action */
        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 16px;
        }

        .search-box {
            max-width: 300px;
        }

        /* Modern Table Style */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            padding: 14px 16px;
            font-weight: 500;
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Data Management Console</h1>
                <div class="subtitle">ระบบบันทึกและจัดการข้อมูลสารสนเทศส่วนกลาง</div>
            </div>
        </header>

        <div class="card">
            <div class="grid-form">
                <div class="form-group">
                    <label for="inputName">ชื่อ - นามสกุล</label>
                    <input type="text" id="inputName" placeholder="ระบุชื่อผู้ใช้งาน">
                </div>
                <div class="form-group">
                    <label for="inputRole">ตำแหน่งงาน / แผนก</label>
                    <input type="text" id="inputRole" placeholder="เช่น Engineer, Marketing">
                </div>
                <div class="form-group">
                    <label for="inputAge">อายุ (ปี)</label>
                    <input type="number" id="inputAge" placeholder="0">
                </div>
                <button class="btn btn-primary" onclick="addData()">เพิ่มบันทึกข้อมูล</button>
            </div>
        </div>

        <div class="card">
            <div class="table-toolbar">
                <input type="text" id="searchBox" class="search-box" placeholder="🔍 ค้นหาข้อมูลในตาราง..." oninput="renderTable()">
                <button class="btn btn-outline" onclick="exportToCSV()">ส่งออกไฟล์ CSV</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ชื่อ - นามสกุล</th>
                            <th>ตำแหน่งงาน / แผนก</th>
                            <th>อายุ</th>
                            <th style="width: 100px; text-align: center;">การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // โหลดข้อมูลจาก LocalStorage
        let dataList = JSON.parse(localStorage.getItem('officialWebData')) || [];

        // ฟังก์ชันแสดงผลข้อมูล
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const searchQuery = document.getElementById('searchBox').value.toLowerCase();
            tableBody.innerHTML = '';

            // กรองข้อมูลตามที่ค้นหา
            const filteredData = dataList.filter(item => 
                item.name.toLowerCase().includes(searchQuery) || 
                item.role.toLowerCase().includes(searchQuery) ||
                item.age.toString().includes(searchQuery)
            );

            if (filteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="no-data">ไม่พบข้อมูลในระบบ</td></tr>`;
                return;
            }

            filteredData.forEach((item, index) => {
                // ค้นหาดัชนีจริงใน dataList เผื่อกรณีลบตอนที่กำลังค้นหาอยู่
                const realIndex = dataList.indexOf(item); 
                
                const row = `
                    <tr>
                        <td style="font-weight: 500;">${escapeHtml(item.name)}</td>
                        <td style="color: var(--text-muted);">${escapeHtml(item.role)}</td>
                        <td>${escapeHtml(item.age)} ปี</td>
                        <td style="text-align: center;">
                            <button class="btn btn-danger" onclick="deleteData(${realIndex})">ลบออก</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // ฟังก์ชันเพิ่มข้อมูล
        function addData() {
            const nameEl = document.getElementById('inputName');
            const roleEl = document.getElementById('inputRole');
            const ageEl = document.getElementById('inputAge');

            if (!nameEl.value.trim() || !roleEl.value.trim() || !ageEl.value.trim()) {
                alert('กรุณากรอกข้อมูลในช่องว่างให้ครบถ้วนเพื่อความสมบูรณ์ของระบบ');
                return;
            }

            dataList.push({
                name: nameEl.value.trim(),
                role: roleEl.value.trim(),
                age: ageEl.value.trim()
            });

            localStorage.setItem('officialWebData', JSON.stringify(dataList));

            // ล้างข้อมูลใน Input
            nameEl.value = '';
            roleEl.value = '';
            ageEl.value = '';

            renderTable();
        }

        // ฟังก์ชันลบข้อมูล
        function deleteData(index) {
            if (confirm('คุณต้องการลบข้อมูลแถวนี้ออกจากระบบอย่างถาวรใช่หรือไม่?')) {
                dataList.splice(index, 1);
                localStorage.setItem('officialWebData', JSON.stringify(dataList));
                renderTable();
            }
        }

        // ฟังก์ชันส่งออกเป็นไฟล์ CSV (เปิดใน Excel ได้)
        function exportToCSV() {
            if (dataList.length === 0) {
                alert('ไม่มีข้อมูลในระบบสำหรับการส่งออก');
                return;
            }

            let csvContent = "\uFEFF"; // ใส่ BOM รองรับภาษาไทยใน Excel
            csvContent += "ชื่อ-นามสกุล,ตำแหน่งงาน/แผนก,อายุ\n";

            dataList.forEach(item => {
                csvContent += `"${item.name}","${item.role}","${item.age}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Data_Report_" + new Date().toISOString().slice(0,10) + ".csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ป้องกัน Security XSS เบื้องต้น
        function escapeHtml(text) {
            return text.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // เริ่มต้นการทำงาน
        renderTable();
    </script>
</body>
</html>
