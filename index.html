<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการข้อมูล - Data Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1e293b; /* สีกรมท่าโมเดิร์น */
            --accent-color: #3b82f6;  /* สีฟ้าสดใสสำหรับปุ่มหลัก */
            --accent-hover: #1d4ed8;
            --danger-color: #ef4444;  /* สีแดงสำหรับลบ */
            --danger-hover: #dc2626;
            --bg-color: #f8fafc;      /* สีพื้นหลังเทาอมฟ้าอ่อน */
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        /* Header */
        header {
            margin-bottom: 32px;
        }
        header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 6px;
        }
        header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Card Layout สำหรับฟอร์ม */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
            background-color: #fff;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* Buttons */
        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            height: 41px; /* ให้เท่ากับระดับ Input */
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-danger {
            background-color: transparent;
            color: var(--danger-color);
            padding: 6px 12px;
            border: 1px solid transparent;
        }

        .btn-danger:hover {
            background-color: rgba(239, 68, 68, 0.08);
            border-radius: 6px;
        }

        /* Modern Table */
        .table-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #fafafa;
            color: var(--text-muted);
            font-weight: 500;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        /* Badge สำหรับตกแต่ง */
        .badge-role {
            background-color: #f1f5f9;
            color: var(--primary-color);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ระบบบริหารจัดการข้อมูลบุคคล</h1>
            <p>กรอกข้อมูลด้านล่างเพื่อบันทึกลงในระบบตารางอย่างเป็นทางการ</p>
        </header>

        <div class="card">
            <div class="form-grid">
                <div class="form-group">
                    <label for="inputName">ชื่อ - นามสกุล</label>
                    <input type="text" id="inputName" placeholder="เช่น สมชาย ใจดี">
                </div>
                <div class="form-group">
                    <label for="inputRole">ตำแหน่งงาน</label>
                    <input type="text" id="inputRole" placeholder="เช่น ผู้จัดการ, นักพัฒนา">
                </div>
                <div class="form-group">
                    <label for="inputAge">อายุ (ปี)</label>
                    <input type="number" id="inputAge" placeholder="เช่น 30">
                </div>
                <button class="btn-primary" onclick="addData()">บันทึกข้อมูล</button>
            </div>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th style="width: 40%;">ชื่อ-นามสกุล</th>
                        <th style="width: 30%;">ตำแหน่งงาน</th>
                        <th style="width: 15%;">อายุ</th>
                        <th style="width: 15%; text-align: right;">การจัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                ไม่มีข้อมูลในระบบในขณะนี้
            </div>
        </div>
    </div>

    <script>
        // โหลดข้อมูลจาก LocalStorage
        let dataList = JSON.parse(localStorage.getItem('officialWebData')) || [];

        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            tableBody.innerHTML = ''; 

            if (dataList.length === 0) {
                emptyState.style.display = 'block';
                return;
            } else {
                emptyState.style.display = 'none';
            }

            dataList.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight: 500;">${item.name}</td>
                    <td><span class="badge-role">${item.role}</span></td>
                    <td>${item.age} ปี</td>
                    <td style="text-align: right;">
                        <button class="btn-danger" onclick="deleteData(${index})">ลบออก</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function addData() {
            const nameEl = document.getElementById('inputName');
            const roleEl = document.getElementById('inputRole');
            const ageEl = document.getElementById('inputAge');

            if (!nameEl.value.trim() || !roleEl.value.trim() || !ageEl.value.trim()) {
                alert('กรุณากรอกข้อมูลในช่องว่างให้ครบถ้วน');
                return;
            }

            dataList.push({
                name: nameEl.value.trim(),
                role: roleEl.value.trim(),
                age: ageEl.value.trim()
            });

            localStorage.setItem('officialWebData', JSON.stringify(dataList));

            // รีเซ็ตค่าในอินพุต
            nameEl.value = '';
            roleEl.value = '';
            ageEl.value = '';

            renderTable();
        }

        function deleteData(index) {
            if (confirm('คุณต้องการลบข้อมูลแถวนี้อย่างถาวรใช่หรือไม่?')) {
                dataList.splice(index, 1);
                localStorage.setItem('officialWebData', JSON.stringify(dataList));
                renderTable();
            }
        }

        // เริ่มต้นระบบโดยแสดงตารางทันทีที่โหลดหน้าเว็บ
        renderTable();
    </script>

</body>
</html>
